# Traccar - Docker Compose for Coolify (Custom Build)
#
# Este compose faz build da sua versao customizada do Traccar
#
# IMPORTANTE: Certifique-se de que o submodule traccar-web esta incluido
# no seu repositorio. Use: git submodule update --init --recursive
#
# Variaveis auto-geradas pelo Coolify:
# - SERVICE_USER_POSTGRES: usuario do banco
# - SERVICE_PASSWORD_POSTGRES: senha do banco
# - SERVICE_URL_TRACCAR_8082: URL publica (http)

services:
  traccar:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '8082:8082'
      - '5000-5150:5000-5150/tcp'
      - '5000-5150:5000-5150/udp'
    environment:
      - SERVICE_URL_TRACCAR_8082
      - 'CONFIG_USE_ENVIRONMENT_VARIABLES=${CONFIG_USE_ENVIRONMENT_VARIABLES:-true}'
      - 'DATABASE_DRIVER=org.postgresql.Driver'
      - 'DATABASE_URL=jdbc:postgresql://postgres:5432/${POSTGRESQL_DATABASE:-traccar}?sslmode=disable'
      - 'DATABASE_USER=${SERVICE_USER_POSTGRES}'
      - 'DATABASE_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
    volumes:
      - 'traccar-logs:/opt/traccar/logs'
      - 'traccar-data:/opt/traccar/data'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://127.0.0.1:8082'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  postgres:
    image: 'postgres:16-alpine'
    restart: unless-stopped
    environment:
      - 'POSTGRES_USER=${SERVICE_USER_POSTGRES}'
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - 'POSTGRES_DB=${POSTGRESQL_DATABASE:-traccar}'
    volumes:
      - 'traccar-postgresql-data:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}'
      interval: 5s
      timeout: 20s
      retries: 10

volumes:
  traccar-logs:
  traccar-data:
  traccar-postgresql-data:
